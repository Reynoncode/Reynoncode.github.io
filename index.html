<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALMODA — Geyim Mağazası</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    main { padding: var(--page-y) var(--page-x); padding-top: clamp(12px, 2vw, 24px); }

    /* ══════════════════════════════
       KATEQORİYA SUB-HEADER
    ══════════════════════════════ */
    .cat-subheader {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 64px;
      z-index: 90;
      padding: 0;
    }

    .cat-subheader-inner {
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 0 var(--page-x);
      gap: 0;
    }
    .cat-subheader-inner::-webkit-scrollbar { display: none; }

    /* Hər kateqoriya düyməsi bərabər genişlik alır — yalnız görünən itemlər üçün */
    .cat-item {
      flex: 1 1 0 !important;
      min-width: 0 !important;
    }
    .cat-item-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .cat-item {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.28rem;
      padding: 1rem 0.5rem 0.9rem;
      border: none;
      background: none;
      font-family: var(--font-body);
      cursor: pointer;
      position: relative;
      transition: background 0.18s;
      border-bottom: 2px solid transparent;
    }
    .cat-item::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 10%; right: 10%;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      transform: scaleX(0);
      transition: transform 0.22s cubic-bezier(.4,0,.2,1);
    }
    .cat-item:hover { background: rgba(0,0,0,0.03); }
    .cat-item:hover::after { transform: scaleX(1); }
    .cat-item.active::after { transform: scaleX(1); }

    .cat-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
    }
    .cat-item-icon svg {
      width: 18px;
      height: 18px;
      stroke: rgba(26, 26, 26, 0.55);
      transition: stroke 0.18s;
      flex-shrink: 0;
    }
    .cat-item:hover .cat-item-icon {
      border-color: rgba(201, 168, 108, 0.6);
      transform: translateY(-2px);
    }
    .cat-item:hover .cat-item-icon svg {
      stroke: rgba(201, 168, 108, 1);
    }
    .cat-item.active .cat-item-icon {
      background: rgba(26, 26, 26, 1);
      border-color: rgba(26, 26, 26, 1);
    }
    .cat-item.active .cat-item-icon svg {
      stroke: rgba(201, 168, 108, 1);
    }

    .cat-item-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
      line-height: 1.2;
      max-width: 72px;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.18s;
    }
    .cat-item:hover .cat-item-label { color: var(--text); }
    .cat-item.active .cat-item-label {
      color: var(--accent);
      font-weight: 600;
    }

    /* Scroll arrows */
    .cat-arrow {
      position: absolute;
      top: 0; bottom: 0;
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to right, var(--surface) 60%, transparent);
      border: none;
      cursor: pointer;
      z-index: 2;
      color: var(--muted);
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .cat-arrow:hover { color: var(--text); }
    .cat-arrow.right {
      right: 0;
      background: linear-gradient(to left, var(--surface) 60%, transparent);
    }
    .cat-arrow.left { left: 0; }
    .cat-arrow.hidden { display: none; }

    /* Active filter pill */
    .active-cat-strip {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem var(--page-x);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .active-cat-strip.show { display: flex; }
    .active-cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #fff;
      padding: 0.25rem 0.75rem 0.25rem 0.65rem;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 600;
    }
    .active-cat-pill button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      line-height: 1;
      padding: 0;
      margin-left: 2px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .active-cat-pill button:hover { color: #fff; }

    /* Filtered empty state */
    .cat-empty {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
    }
    .cat-empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .cat-empty p { font-size: 0.9rem; line-height: 1.6; }
    
    @media (max-width: 768px) {
  .cat-item-icon { display: none; }
  .cat-item { padding: 0.45rem 0.3rem; gap: 0; }
  .cat-item-label { font-size: 0.72rem; }
}

    /* ══ KAMPANİYA SLİDER ══ */
    #campaignSlider:hover #csPrev,
    #campaignSlider:hover #csNext { opacity: 1 !important; }

    #campaignTrack .cs-slide {
      /* Genişlik JS-də ayarlanır */
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Hündürlük: 15vh, minimum 90px, maksimum 200px */
      height: clamp(90px, 30vh, 400px);
      overflow: hidden;
    }
    #campaignTrack .cs-slide img {
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
      pointer-events: none;
      user-select: none;
    }

    /* Dots */
    .cs-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.5);
      border: none; cursor: pointer;
      padding: 0; transition: background .2s, transform .2s;
    }
    .cs-dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* Mobile: ok düymələri həmişə görünsün */
    @media (max-width: 600px) {
      #csPrev, #csNext { opacity: .7 !important; width:30px!important;height:30px!important; }
    }
  </style>
</head>
<body>
<header></header>

<!-- KATEQORİYA SUB-HEADER -->
<nav class="cat-subheader" id="categoryBar">
  <div style="position:relative;">
    <button class="cat-arrow left hidden" id="catArrowLeft" onclick="scrollCatBar(-200)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="cat-subheader-inner" id="catBarInner"></div>
    <button class="cat-arrow right hidden" id="catArrowRight" onclick="scrollCatBar(200)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</nav>

<!-- AKTİV FİLTR STRİPİ -->
<div class="active-cat-strip" id="activeCatStrip">
  <span>Filtr:</span>
  <div class="active-cat-pill" id="activeCatPill">
    <span id="activeCatLabel"></span>
    <button onclick="clearCategoryFilter()" title="Filtri sil">✕</button>
  </div>
  <span id="filteredCount" style="margin-left:auto;"></span>
</div>

<main>
  <!-- ══ KAMPANİYA SLİDER ══ -->
  <div id="campaignSliderWrap" style="display:none;margin-bottom:0.75rem;">
    <div id="campaignSlider" style="position:relative;width:100%;overflow:hidden;border-radius:12px;background:var(--surface);">
      <!-- Track -->
      <div id="campaignTrack"
        style="display:flex;transition:transform .55s cubic-bezier(.4,0,.2,1);will-change:transform;">
      </div>

      <!-- Prev / Next arrows — hover ile gorunsun -->
      <button id="csPrev" aria-label="Əvvəlki"
        style="position:absolute;left:10px;top:50%;transform:translateY(-50%);
               width:38px;height:38px;border-radius:50%;border:none;
               background:rgba(255,255,255,.88);box-shadow:0 2px 8px rgba(0,0,0,.18);
               cursor:pointer;display:flex;align-items:center;justify-content:center;
               opacity:0;transition:opacity .2s;z-index:10;color:#222;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="csNext" aria-label="Növbəti"
        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
               width:38px;height:38px;border-radius:50%;border:none;
               background:rgba(255,255,255,.88);box-shadow:0 2px 8px rgba(0,0,0,.18);
               cursor:pointer;display:flex;align-items:center;justify-content:center;
               opacity:0;transition:opacity .2s;z-index:10;color:#222;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- Dots -->
      <div id="csDots" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;"></div>
    </div>
  </div>


  <div class="product-grid" id="productGrid"></div>
  <div id="showMoreWrap" style="display:none; text-align:center; padding: 24px 0 32px;">
    <button id="showMoreBtn" style="
      background: var(--primary, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 2px 12px rgba(124,58,237,.25);
    "
    onmouseover="this.style.opacity='.85';this.style.transform='translateY(-1px)'"
    onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'"
    >Daha çox göstər</button>
  </div>
</main>

<footer></footer>

<!-- Auth Modal -->
<div class="overlay" id="authModal"></div>
<!-- Cart Modal -->
<div class="overlay" id="cartModal"></div>
<!-- Listing Modal -->
<div class="overlay" id="listingModal">
  <div class="modal listing-modal">
    <div class="modal-header">
      <h2 class="modal-title">Elan Əlavə Et</h2>
      <button class="modal-close" aria-label="Bağla">✕</button>
    </div>
    <form id="listingForm" onsubmit="return false">
      <div class="form-group">
        <label class="form-label">Şəkillər <span class="muted">(maksimum 5)</span></label>
        <input type="file" id="imgInput" accept="image/*" multiple style="display:none"
               onchange="listing.handleImages(this.files); this.value='';" />
        <div id="imgPreviews" class="img-previews"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="lBrand">Marka</label>
        <input class="form-input" type="text" id="lBrand" placeholder="Zara, H&M, Nike..." maxlength="40" />
      </div>
      <div class="form-group">
        <label class="form-label" for="lName">Məhsul adı</label>
        <input class="form-input" type="text" id="lName" placeholder="Məs: Yay midi donu" maxlength="80" />
      </div>
      <div class="form-group">
        <label class="form-label" for="lPrice">Qiymət (₼)</label>
        <input class="form-input" type="number" id="lPrice" placeholder="0.00"
               min="0" step="0.01" inputmode="decimal" />
      </div>
      <button type="button" class="btn-submit" id="listingSubmitBtn" onclick="listing.submit()">
        Elanı Yayımla
      </button>
    </form>
  </div>
</div>

<script>
  /* ══════════════════════════════════════════════════════
     KATEQORİYALAR
     — Yalnız "Hamısı" sabit qalır, qalanı Firebase-dən gəlir
     — "settings/categories" (public) → "admin/platformSettings" (fallback)
  ══════════════════════════════════════════════════════ */

  let CATEGORIES = [
    { id: 'all', icon: '🛍️', label: 'Hamısı' }
  ];

  let activeCategoryId = 'all';

  /* ────────────────────────────────────────
     Firebase-dən kateqoriyaları yüklə
  ──────────────────────────────────────── */
  async function loadCategoriesFromFirebase() {
    let cats = null;

    try {
      const pubSnap = await fbDb.collection('settings').doc('categories').get();
      if (pubSnap.exists) {
        cats = pubSnap.data().items || null;
      }
    } catch(e) {
      console.warn('Public kateqoriyalar oxunmadı:', e.message);
    }

    if (!cats) {
      try {
        const adminSnap = await fbDb.collection('admin').doc('platformSettings').get();
        if (adminSnap.exists) {
          const d = adminSnap.data();
          cats = d.mainCategories || d.categories || null;
        }
      } catch(e) {
        console.warn('Admin kateqoriyalar oxunmadı:', e.message);
      }
    }

    if (Array.isArray(cats) && cats.length) {
      CATEGORIES = [
        { id: 'all', icon: '🛍️', label: 'Hamısı' },
        ...cats.map(c => ({
          id:    c.id    || (c.label || '').toLowerCase().replace(/\s+/g, '-') || ('cat_' + Date.now()),
          icon:  c.icon  || '📁',
          label: c.label || c.name || 'Kateqoriya',
        }))
      ];
    }
    buildCategoryBar();
    applyFilter();
  }

  /* ────────────────────────────────────────
     Kateqoriya bar-ını qur
  ──────────────────────────────────────── */
  function getVisibleCatCount() {
    const w = window.innerWidth;
    if (w <= 360) return 5;
    if (w <= 480) return 6;
    if (w <= 600) return 7;
    if (w <= 768) return 9;
    if (w <= 900) return 11;
    if (w <= 1100) return 13;
    return 15;
  }

  function buildCategoryBar() {
    const inner = document.getElementById('catBarInner');
    if (!inner) return;

    const visibleCount = getVisibleCatCount();

    // Bütün kateqoriyaları render et
    inner.innerHTML = CATEGORIES.map(cat => `
      <button
        class="cat-item${cat.id === activeCategoryId ? ' active' : ''}"
        data-cat="${cat.id}"
        onclick="selectCategory('${cat.id}', this)">
        <div class="cat-item-icon">${getLucideIcon(cat.icon || '📁')}</div>
        <span class="cat-item-label">${cat.label}</span>
      </button>
    `).join('');

    // Görünən itemlərə bərabər genişlik ver, qalanları scroll ilə əlçatan olsun
    const items = inner.querySelectorAll('.cat-item');
    const containerW = inner.clientWidth || window.innerWidth;
    const itemW = Math.floor(containerW / visibleCount);
    items.forEach(btn => {
      btn.style.flex = 'none';
      btn.style.width = itemW + 'px';
    });

    inner.addEventListener('scroll', updateArrows, { passive: true });
    setTimeout(updateArrows, 50);
  }

  // Ekran ölçüsü dəyişəndə yenidən qur
  let _catResizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(_catResizeTimer);
    _catResizeTimer = setTimeout(() => {
      buildCategoryBar();
    }, 150);
  });

  function updateArrows() {
    const inner = document.getElementById('catBarInner');
    const left  = document.getElementById('catArrowLeft');
    const right = document.getElementById('catArrowRight');
    if (!inner) return;
    left?.classList.toggle('hidden',  inner.scrollLeft <= 0);
    right?.classList.toggle('hidden', inner.scrollLeft + inner.clientWidth >= inner.scrollWidth - 2);
  }

  function scrollCatBar(delta) {
    const inner = document.getElementById('catBarInner');
    if (inner) inner.scrollBy({ left: delta, behavior: 'smooth' });
  }

  function selectCategory(catId, btnEl) {
    activeCategoryId = catId;
    document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active');

    const strip   = document.getElementById('activeCatStrip');
    const pill    = document.getElementById('activeCatLabel');
    const titleEl = document.getElementById('mainSectionTitle');
    const cat     = CATEGORIES.find(c => c.id === catId);

    if (catId === 'all') {
      strip?.classList.remove('show');
      if (titleEl) titleEl.textContent = 'Yeni Kolleksiya';
    } else {
      if (pill) pill.textContent = `${cat?.label || catId}`;
      strip?.classList.add('show');
      if (titleEl) titleEl.textContent = `${cat?.label || catId}`;
    }
    applyFilter();
  }

  function clearCategoryFilter() {
    const allBtn = document.querySelector('.cat-item[data-cat="all"]');
    selectCategory('all', allBtn);
  }

  /* ────────────────────────────────────────
     FİLTR — DÜZƏLDİLMİŞ
     
     PROBLEM: Kartlar `data-id` ilə yaradılır (products.js-də createProductCard),
     amma köhnə kod `data-product-id` axtarırdı — heç vaxt tapılmırdı.
     Həmçinin 'all' branch-i yalnız display:'' edirdi, renderProducts çağırmırdı,
     buna görə kateqoriyadan 'Hamısı'-ya qayıdanda ekran boş qalırdı.
     
     HƏLL: 
     1. `data-id` selector-u istifadə et (products.js ilə uyğun)
     2. 'all' üçün həmişə renderProducts(PRODUCTS) çağır — DOM-u tam yenilə
     3. Filter üçün də renderProducts(filtered) çağır — eyni yanaşma
  ──────────────────────────────────────── */
  function applyFilter() {
    const grid            = document.getElementById('productGrid');
    const countEl         = document.getElementById('productCount');
    const filteredCountEl = document.getElementById('filteredCount');
    if (!grid) return;

    // Boş vəziyyət elementini hər dəfə təmizlə
    grid.querySelector('.cat-empty')?.remove();

    if (activeCategoryId === 'all') {
      // Bütün məhsulları göstər — həmişə renderProducts ilə yenilə
      renderProducts(PRODUCTS, 'productGrid');
      if (countEl) countEl.textContent = `${PRODUCTS.length} məhsul`;
      if (filteredCountEl) filteredCountEl.textContent = '';
      return;
    }

    // Aktiv kateqoriyaya görə filtr et
    const filtered = PRODUCTS.filter(p => {
      // 1. Yeni sistem: mainCategory birbaşa kateqoriya id-sidir
      if (p.mainCategory === activeCategoryId) return true;
      // 2. Vendor kateqoriyaları array (mağaza parametrlərindən)
      const vendorCats = p.vendorCategories || [];
      if (vendorCats.includes(activeCategoryId)) return true;
      // 3. Köhnə sistem: category string uyğunluğu
      const cat = (p.category || '').toLowerCase();
      return cat === activeCategoryId || cat.includes(activeCategoryId);
    });

    // Filtrlənmiş məhsulları render et
    renderProducts(filtered, 'productGrid');

    const shown = filtered.length;
    if (countEl) countEl.textContent = `${shown} məhsul`;
    if (filteredCountEl) filteredCountEl.textContent = `${shown} nəticə`;

    // Boş vəziyyət
    if (shown === 0) {
      const cat = CATEGORIES.find(c => c.id === activeCategoryId);
      grid.insertAdjacentHTML('afterbegin', `
        <div class="cat-empty" style="grid-column:1/-1;">
          <div class="cat-empty-icon">${getLucideIcon(cat?.icon || '🔍')}</div>
          <p><strong>${cat?.label || activeCategoryId}</strong> kateqoriyasında<br>hələ məhsul yoxdur.</p>
        </div>
      `);
    }
  }

  /* ════════════════════════════════════════════════════════
     KAMPANİYA SLİDER
  ════════════════════════════════════════════════════════ */
  async function loadCampaignSlider() {
    try {
      let items = [];
      try {
        const snap = await fbDb.collection('settings').doc('campaigns').get();
        if (snap.exists) items = snap.data().items || [];
      } catch(e) {
        try {
          const snap2 = await fbDb.collection('admin').doc('platformSettings').get();
          if (snap2.exists) items = snap2.data().campaigns || [];
        } catch(_) {}
      }
      if (!items.length) return;

      const wrap  = document.getElementById('campaignSliderWrap');
      const track = document.getElementById('campaignTrack');
      const dots  = document.getElementById('csDots');
      if (!wrap || !track || !dots) return;
      wrap.style.display = 'block';

      const total = items.length;
      let current = 0, autoTimer = null, isAnimating = false;

      track.innerHTML = items.map((c, i) =>
        '<div class="cs-slide" style="width:100%;flex-shrink:0;">' +
        '<img src="' + c.url + '" alt="' + (c.name || 'Kampaniya').replace(/"/g,'&quot;') + '" draggable="false" loading="' + (i===0?'eager':'lazy') + '"/></div>'
      ).join('');

      function renderDots() {
        dots.innerHTML = items.map((_, i) =>
          '<button class="cs-dot' + (i===0?' active':'') + '" onclick="csGoSlide(' + i + ')"></button>'
        ).join('');
      }
      renderDots();

      window.csGoSlide = function(n) {
        if (isAnimating) return;
        isAnimating = true;
        current = ((n % total) + total) % total;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        dots.querySelectorAll('.cs-dot').forEach((d, i) => d.classList.toggle('active', i === current));
        setTimeout(() => { isAnimating = false; }, 580);
        resetAutoPlay();
      };

      function resetAutoPlay() {
        clearInterval(autoTimer);
        if (total > 1) autoTimer = setInterval(() => csGoSlide(current + 1), 7000);
      }

      const prevBtn = document.getElementById('csPrev');
      const nextBtn = document.getElementById('csNext');
      if (prevBtn) prevBtn.onclick = () => csGoSlide(current - 1);
      if (nextBtn) nextBtn.onclick = () => csGoSlide(current + 1);
      if (total === 1) {
        if (prevBtn) prevBtn.style.display = 'none';
        if (nextBtn) nextBtn.style.display = 'none';
        dots.style.display = 'none';
      }

      let touchStartX = 0, touchStartY = 0;
      track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive:true});
      track.addEventListener('touchend', e => {
        const dx = touchStartX - e.changedTouches[0].clientX;
        const dy = Math.abs(touchStartY - e.changedTouches[0].clientY);
        if (Math.abs(dx) > 40 && Math.abs(dx) > dy) csGoSlide(current + (dx > 0 ? 1 : -1));
      }, {passive:true});

      let mouseStartX = 0, isDragging = false;
      track.addEventListener('mousedown', e => { mouseStartX = e.clientX; isDragging = true; });
      track.addEventListener('mouseup', e => {
        if (!isDragging) return; isDragging = false;
        const dx = mouseStartX - e.clientX;
        if (Math.abs(dx) > 40) csGoSlide(current + (dx > 0 ? 1 : -1));
      });
      track.addEventListener('mouseleave', () => { isDragging = false; });

      const sliderEl = document.getElementById('campaignSlider');
      if (sliderEl) {
        sliderEl.addEventListener('mouseenter', () => clearInterval(autoTimer));
        sliderEl.addEventListener('mouseleave', () => resetAutoPlay());
      }
      resetAutoPlay();
    } catch(e) {
      console.warn('Kampaniya slider yuklenmeди:', e.message);
    }
  }

  /* ────────────────────────────────────────
     SEHIFE YUKLENME
  ──────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    loadCategoriesFromFirebase();
    loadCampaignSlider();
    loadListings();
    listing.renderPreviews();
  });
</script>
