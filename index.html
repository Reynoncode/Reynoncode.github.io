<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALMODA — Geyim Mağazası</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    main { padding: var(--page-y) var(--page-x); }
  </style>
</head>
<body>

<header></header>

<div class="hero-strip">
  <p>🚚 <span>50 AZN</span> üzərindəki sifarişlərə pulsuz çatdırılma &nbsp;|&nbsp; Yeni kolleksiya gəldi ✨</p>
</div>

<main>
  <div class="section-header">
    <h1 class="section-title">Yeni Kolleksiya</h1>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span class="section-count" id="productCount"></span>
      <button class="btn-add-listing" onclick="listing.open()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Elan əlavə et
      </button>
    </div>
  </div>
  <div class="product-grid" id="productGrid"></div>
</main>

<footer></footer>

<!-- Auth Modal -->
<div class="overlay" id="authModal"></div>

<!-- Cart Modal -->
<div class="overlay" id="cartModal"></div>

<!-- Listing Modal -->
<div class="overlay" id="listingModal">
  <div class="modal listing-modal">
    <div class="modal-header">
      <h2 class="modal-title">Elan Əlavə Et</h2>
      <button class="modal-close" aria-label="Bağla">✕</button>
    </div>
    <form id="listingForm" onsubmit="return false">

      <div class="form-group">
        <label class="form-label">Şəkillər <span class="muted">(maksimum 5)</span></label>
        <input type="file" id="imgInput" accept="image/*" multiple style="display:none"
               onchange="listing.handleImages(this.files); this.value='';" />
        <div id="imgPreviews" class="img-previews"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="lBrand">Marka</label>
        <input class="form-input" type="text" id="lBrand" placeholder="Zara, H&M, Nike..." maxlength="40" />
      </div>

      <div class="form-group">
        <label class="form-label" for="lName">Məhsul adı</label>
        <input class="form-input" type="text" id="lName" placeholder="Məs: Yay midi donu" maxlength="80" />
      </div>

      <div class="form-group">
        <label class="form-label" for="lPrice">Qiymət (₼)</label>
        <input class="form-input" type="number" id="lPrice" placeholder="0.00"
               min="0" step="0.01" inputmode="decimal" />
      </div>

      <button type="button" class="btn-submit" id="listingSubmitBtn" onclick="listing.submit()">
        Elanı Yayımla
      </button>

    </form>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
<script src="js/product-detail.js"></script>
<script src="js/reviews.js"></script>
<script src="js/components.js"></script>
<script src="js/store.js"></script> 

  

<script>
  document.addEventListener('DOMContentLoaded', () => {
    loadListings();
    listing.renderPreviews();
  });
</script>

</body>
</html>
