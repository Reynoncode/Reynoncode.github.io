<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MODA — Geyim Mağazası</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f4f0;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #7a7a7a;
      --accent: #c9a86c;
      --accent-dark: #a8843d;
      --border: #e5e0d8;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.14);
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(16px, 4vw, 48px);
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 20px; height: 20px; fill: white; }

    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .logo-name span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .btn-signin {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 8px 18px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      transition: all 0.2s;
    }

    .btn-signin:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #fdf8f0;
    }

    .btn-signin svg { width: 18px; height: 18px; }

    /* ── HERO STRIP ── */
    .hero-strip {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2418 100%);
      color: white;
      text-align: center;
      padding: 14px 20px;
    }

    .hero-strip p {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }

    .hero-strip span { color: var(--accent); font-weight: 600; }

    /* ── MAIN ── */
    main { padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 48px); }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
    }

    .section-count {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── PRODUCT GRID ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* ── PRODUCT CARD ── */
    .card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s, transform 0.3s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #f0ece6;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-img-wrap img { transform: scale(1.06); }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #e63946;
      color: white;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 50px;
      letter-spacing: 0.05em;
    }

    .badge.new { background: var(--accent); }

    .fav-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.2s;
    }

    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn svg { width: 16px; height: 16px; }
    .fav-btn.active svg { fill: #e63946; stroke: #e63946; }

    .card-body { padding: 14px 16px 16px; }

    .card-brand {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .card-name {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .price-wrap { display: flex; flex-direction: column; gap: 2px; }

    .price-old {
      font-size: 0.76rem;
      color: var(--muted);
      text-decoration: line-through;
    }

    .price-new {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .price-new.sale { color: #e63946; }

    .cart-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .cart-btn:hover { background: var(--accent-dark); transform: scale(1.08); }
    .cart-btn svg { width: 17px; height: 17px; fill: white; }

    /* ── LOGIN OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,16,10,0.55);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.2);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }

    .overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--muted);
      transition: background 0.2s;
    }

    .modal-close:hover { background: var(--border); }

    .modal-logo {
      text-align: center;
      margin-bottom: 6px;
    }

    .modal-logo .logo-name { font-size: 1.8rem; }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 6px;
    }

    .modal-sub {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); background: white; }

    .form-group input::placeholder { color: #bbb; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.04em;
    }

    .btn-submit:hover { background: #333; transform: translateY(-1px); }

    .modal-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .modal-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .modal { padding: 32px 24px; }
      .btn-signin span { display: none; }
      .btn-signin { padding: 8px 12px; }
    }

    @media (max-width: 360px) {
      .product-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C9.24 2 7 4.24 7 7v1H5c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2h-2V7c0-2.76-2.24-5-5-5zm0 2c1.66 0 3 1.34 3 3v1H9V7c0-1.66 1.34-3 3-3zm0 10c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"/></svg>
    </div>
    <span class="logo-name">MO<span>DA</span></span>
  </a>

  <div class="header-right">
    <button class="btn-signin" id="signinBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
      <span>Daxil ol</span>
    </button>
  </div>
</header>

<!-- ── HERO STRIP ── -->
<div class="hero-strip">
  <p>🚚 <span>50 AZN</span> üzərindəki sifarişlərə pulsuz çatdırılma &nbsp;|&nbsp; Yeni kolleksiya gəldi ✨</p>
</div>

<!-- ── MAIN ── -->
<main>
  <div class="section-header">
    <h1 class="section-title">Yeni Kolleksiya</h1>
    <span class="section-count">24 məhsul</span>
  </div>

  <div class="product-grid" id="productGrid"></div>
</main>

<!-- ── LOGIN OVERLAY ── -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="closeModal">✕</button>
    <div class="modal-logo">
      <span class="logo-name">MO<span style="color:var(--accent)">DA</span></span>
    </div>
    <h2>Xoş gəldiniz</h2>
    <p class="modal-sub">Hesabınıza daxil olun</p>

    <div class="form-group">
      <label>Ad Soyad</label>
      <input type="text" placeholder="Adınızı daxil edin" />
    </div>
    <div class="form-group">
      <label>E-poçt</label>
      <input type="email" placeholder="ornek@mail.com" />
    </div>
    <div class="form-group">
      <label>Şifrə</label>
      <input type="password" placeholder="••••••••" />
    </div>
    <button class="btn-submit">Daxil ol</button>
    <div class="modal-footer">
      Hesabınız yoxdur? <a href="#">Qeydiyyat</a>
    </div>
  </div>
</div>

<script>
  // ── PRODUCTS DATA ──
  const products = [
    { id:1, brand:"Zara", name:"Yüngül Pambıq Köynek", price:89, oldPrice:120, badge:"Endirim", img:"https://images.unsplash.com/photo-1594938298603-c8148c4b4087?w=400&q=80" },
    { id:2, brand:"H&M", name:"Slim Fit Cins Şalvar", price:75, oldPrice:null, badge:"Yeni", img:"https://images.unsplash.com/photo-1542272454315-4c01d7abdf4a?w=400&q=80" },
    { id:3, brand:"Mango", name:"Kətan Palto", price:210, oldPrice:280, badge:"Endirim", img:"https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=400&q=80" },
    { id:4, brand:"Pull&Bear", name:"Oversize Hoodie", price:65, oldPrice:null, badge:"Yeni", img:"https://images.unsplash.com/photo-1614975059251-992f11792b9f?w=400&q=80" },
    { id:5, brand:"Bershka", name:"Çiçəkli Yay Donu", price:55, oldPrice:85, badge:"Endirim", img:"https://images.unsplash.com/photo-1572804013427-4d7ca7268217?w=400&q=80" },
    { id:6, brand:"Zara", name:"Dəri Ceket", price:185, oldPrice:null, badge:"Yeni", img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&q=80" },
    { id:7, brand:"H&M", name:"Trikotaj Kazak", price:48, oldPrice:70, badge:"Endirim", img:"https://images.unsplash.com/photo-1620799139507-2a76f79a2f4d?w=400&q=80" },
    { id:8, brand:"Mango", name:"Klassik Blazer", price:155, oldPrice:null, badge:"Yeni", img:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400&q=80" },
  ];

  // ── RENDER CARDS ──
  const grid = document.getElementById('productGrid');

  products.forEach(p => {
    const isSale = p.oldPrice !== null;
    const isNew  = p.badge === "Yeni";
    grid.innerHTML += `
      <div class="card">
        <div class="card-img-wrap">
          <img src="${p.img}" alt="${p.name}" loading="lazy" />
          <span class="badge ${isNew ? 'new' : ''}">${p.badge}</span>
          <button class="fav-btn" onclick="toggleFav(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>
        <div class="card-body">
          <div class="card-brand">${p.brand}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-footer">
            <div class="price-wrap">
              ${p.oldPrice ? `<span class="price-old">${p.oldPrice} ₼</span>` : ''}
              <span class="price-new ${isSale ? 'sale' : ''}">${p.price} ₼</span>
            </div>
            <button class="cart-btn" title="Səbətə əlavə et">
              <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
            </button>
          </div>
        </div>
      </div>`;
  });

  // ── LOGIN POPUP ──
  const overlay   = document.getElementById('overlay');
  const signinBtn = document.getElementById('signinBtn');
  const closeBtn  = document.getElementById('closeModal');

  signinBtn.addEventListener('click', () => overlay.classList.add('open'));
  closeBtn.addEventListener('click',  () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if(e.target === overlay) overlay.classList.remove('open'); });
  document.addEventListener('keydown', e => { if(e.key === 'Escape') overlay.classList.remove('open'); });

  // ── FAVOURITE TOGGLE ──
  function toggleFav(btn) {
    btn.classList.toggle('active');
    const svg = btn.querySelector('svg');
    if (btn.classList.contains('active')) {
      svg.setAttribute('fill', '#e63946');
      svg.setAttribute('stroke', '#e63946');
    } else {
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', '#888');
    }
  }
</script>
</body>
</html>
