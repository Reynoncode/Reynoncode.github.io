<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil — MODA</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <style>
    main { padding: var(--page-y) var(--page-x); max-width: 600px; margin: 0 auto; }

    .profile-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow);
    }

    .profile-top {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 1.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-top-info h2 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    .profile-top-info p {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      margin-top: 28px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn-logout {
      width: 100%;
      margin-top: 32px;
      background: none;
      border: 1.5px solid var(--danger);
      color: var(--danger);
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: var(--danger);
      color: white;
    }

    .readonly-field {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      color: var(--muted);
      background: var(--bg);
    }

    @media (max-width: 600px) {
      .profile-card { padding: 24px 20px; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header></header>

<main>
  <div class="profile-card">

    <!-- Yuxarı: avatar + ad + email -->
    <div class="profile-top">
      <div class="profile-avatar" id="profileAvatar">...</div>
      <div class="profile-top-info">
        <h2 id="profileName">Yüklənir...</h2>
        <p id="profileEmail"></p>
      </div>
    </div>

    <!-- Xəbər mesajı -->
    <div id="saveMsg" style="
      display:none;
      background:#f0faf4;
      color:#2d7a47;
      border-radius:var(--radius-md);
      padding:10px 14px;
      font-size:0.85rem;
      margin-bottom:16px;
    ">✓ Məlumatlar saxlanıldı</div>

    <!-- Əsas məlumatlar -->
    <div class="section-label">Əsas məlumatlar</div>

    <div class="field-row">
      <div class="form-group">
        <label>Ad Soyad</label>
        <input type="text" id="fieldName" placeholder="Adınız" />
      </div>
      <div class="form-group">
        <label>E-poçt</label>
        <div class="readonly-field" id="fieldEmail"></div>
      </div>
    </div>

    <!-- Əlavə məlumatlar -->
    <div class="section-label">Əlavə məlumatlar <span style="font-weight:400;color:var(--muted)">(istəyə bağlı)</span></div>

    <div class="field-row">
      <div class="form-group">
        <label>Telefon</label>
        <input type="tel" id="fieldPhone" placeholder="+994 __ ___ __ __" />
      </div>
      <div class="form-group">
        <label>Cinsiyyət</label>
        <select id="fieldGender">
          <option value="">Seçin</option>
          <option value="kisi">Kişi</option>
          <option value="qadin">Qadın</option>
          <option value="diger">Digər</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Ünvan</label>
      <input type="text" id="fieldAddress" placeholder="Şəhər, küçə, ev nömrəsi" />
    </div>

    <button class="btn btn-primary btn-full" id="saveBtn" style="margin-top:8px">
      Saxla
    </button>

    <button class="btn-logout" id="logoutBtn">Çıxış</button>

  </div>
</main>

<footer></footer>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/products.js"></script>
<script src="../js/components.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {

    fbAuth.onAuthStateChanged(async user => {
      // Giriş edilməyibsə ana səhifəyə qayıt
      if (!user) {
        window.location.href = '/index.html';
        return;
      }

      // Avatar
      const avatarEl = document.getElementById('profileAvatar');
      if (user.photoURL) {
        avatarEl.innerHTML = `<img src="${user.photoURL}" alt="avatar"/>`;
      } else {
        avatarEl.textContent = (user.displayName || user.email)[0].toUpperCase();
      }

      // Firestore-dan məlumatları yüklə
      const snap = await fbDb.collection('users').doc(user.uid).get();
      const data = snap.exists ? snap.data() : {};

      document.getElementById('profileName').textContent  = data.displayName || user.displayName || '—';
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('fieldEmail').textContent   = user.email;
      document.getElementById('fieldName').value          = data.displayName || user.displayName || '';
      document.getElementById('fieldPhone').value         = data.phone   || '';
      document.getElementById('fieldGender').value        = data.gender  || '';
      document.getElementById('fieldAddress').value       = data.address || '';
    });

    // Saxla
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const user = fbAuth.currentUser;
      if (!user) return;

      const btn  = document.getElementById('saveBtn');
      btn.disabled    = true;
      btn.textContent = 'Saxlanılır...';

      const name    = document.getElementById('fieldName').value.trim();
      const phone   = document.getElementById('fieldPhone').value.trim();
      const gender  = document.getElementById('fieldGender').value;
      const address = document.getElementById('fieldAddress').value.trim();

      await user.updateProfile({ displayName: name });
      await fbDb.collection('users').doc(user.uid).set({
        displayName: name,
        phone,
        gender,
        address,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      document.getElementById('profileName').textContent = name;

      const msg = document.getElementById('saveMsg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);

      btn.disabled    = false;
      btn.textContent = 'Saxla';
    });

    // Çıxış
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (confirm('Çıxmaq istəyirsiniz?')) {
        await auth.logout();
        window.location.href = '/index.html';
      }
    });

  });
</script>
</body>
</html>
